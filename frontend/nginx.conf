server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve real files when they exist, otherwise hand the request
    # to index.html so the React app boots and renders its own 404 page for
    # unknown paths (the app only has the `/` route).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
